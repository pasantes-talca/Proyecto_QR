<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📦 Escáner QR - Stock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 1.5rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        #status {
            min-height: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
        }
        .success {
            background: #d1e7dd;
            color: #0f5132;
        }
        .error {
            background: #f8d7da;
            color: #842029;
        }
        #details {
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" style="max-width: 600px; margin: 0 auto;">
            <div class="card-header text-center">
                <h3 class="mb-0">🔍 Escaneo de Entrada</h3>
            </div>
            <div class="card-body p-4">
                <div class="mb-3">
                    <label class="form-label fw-bold">Código QR</label>
                    <input type="text" id="qr" class="form-control form-control-lg" 
                           placeholder="Escaneá un QR y Enter..." autofocus>
                </div>
                
                <div class="form-check form-switch mb-3">
                    <input class="form-check-input" type="checkbox" id="complete">
                    <label class="form-check-label" for="complete">
                        ✅ Pallet completo
                    </label>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-bold">Cantidad de packs</label>
                    <input type="number" id="packs" class="form-control" 
                           placeholder="Ej: 24" min="1" disabled>
                </div>
                
                <button id="btn" class="btn btn-primary w-100 py-2 fw-bold">
                    📤 Registrar
                </button>
                
                <div id="status" class="mt-3 d-none"></div>
                <pre id="details" class="mt-3 small p-3 rounded d-none"></pre>
            </div>
        </div>
    </div>
    
    <script src="/static/js/app.js"></script>
</body>
</html>
